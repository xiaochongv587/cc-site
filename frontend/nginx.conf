server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 静态资源缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API 反向代理到 Flask 后端
    location /api/ {
        proxy_pass http://backend:7200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 8m;
    }

    # 上传文件与 RSS/sitemap 交给后端
    location /uploads/ { proxy_pass http://backend:7200; }
    location = /rss.xml { proxy_pass http://backend:7200; }
    location = /sitemap.xml { proxy_pass http://backend:7200; }

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}
