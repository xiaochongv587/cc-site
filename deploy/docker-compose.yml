# 本地构建并运行（分离式：backend + web + MySQL）
# 用法：cd deploy && cp .env.example .env.local && ./scripts/up-local.sh up -d --build
# 自定义宿主机挂载目录（三种方式，见 .env.example）：
#   1. 在 deploy/.env 设置 MYSQL_DATA_DIR / UPLOADS_DATA_DIR
#   2. 启动时临时指定：MYSQL_DATA_DIR=/data/mysql docker compose up -d
#   3. 不设置则使用 Docker 命名卷（mysql_data / uploads_data）

name: cc-site

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cc_site}
      MYSQL_USER: ${MYSQL_USER:-ccsite}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ccsitepass}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - ${MYSQL_DATA_DIR:-mysql_data}:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${IMAGE_REGISTRY:-ccr.ccs.tencentyun.com}/${IMAGE_NAMESPACE:-ccsite}/cc-site-backend:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/images/backend/Dockerfile
      args:
        VERSION: ${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-ccsite}:${MYSQL_PASSWORD:-ccsitepass}@db:3306/${MYSQL_DATABASE:-cc_site}?charset=utf8mb4
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      SITE_URL: ${SITE_URL:-http://localhost:8080}
    volumes:
      - ${UPLOADS_DATA_DIR:-uploads_data}:/app/uploads
    ports:
      - "${BACKEND_PORT:-8070}:7200"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7200/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  web:
    image: ${IMAGE_REGISTRY:-ccr.ccs.tencentyun.com}/${IMAGE_NAMESPACE:-ccsite}/cc-site-web:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/images/web/Dockerfile
      args:
        VERSION: ${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
      - "${WEB_HTTPS_PORT:-8443}:443"
    volumes:
      # 宿主机额外 nginx 配置目录（相对 deploy/ 或绝对路径，见 NGINX_EXTRA_CONF_DIR）
      # 注意：使用相对路径会依赖 compose/up 时的当前工作目录。
      - ${NGINX_EXTRA_CONF_DIR:-nginx-conf}:/etc/nginx/extra:ro
    depends_on:
      backend:
        condition: service_healthy

# 未指定宿主机路径时使用的命名卷（MYSQL_DATA_DIR / UPLOADS_DATA_DIR 留空即生效）
volumes:
  mysql_data: {}
  uploads_data: {}
  nginx-conf: {}