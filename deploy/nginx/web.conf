server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://backend:7200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 8m;
    }

    location /uploads/ { proxy_pass http://backend:7200; }
    location = /rss.xml { proxy_pass http://backend:7200; }
    location = /sitemap.xml { proxy_pass http://backend:7200; }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 宿主机挂载的额外配置（见 docker-compose 中 NGINX_EXTRA_CONF_DIR）
    include /etc/nginx/extra/*.conf;
}
