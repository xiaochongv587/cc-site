# 一体式部署：单容器 app（Nginx + Flask）+ MySQL
# 用法：cd deploy && ./scripts/up-local.sh -f docker-compose.bundle.yml up -d --build

name: cc-site

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cc_site}
      MYSQL_USER: ${MYSQL_USER:-ccsite}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ccsitepass}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - ${MYSQL_DATA_DIR:-mysql_data}:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: ${DOCKERHUB_USER:-xiaochongv587}/cc-site-app:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/images/app/Dockerfile
      args:
        VERSION: ${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-ccsite}:${MYSQL_PASSWORD:-ccsitepass}@db:3306/${MYSQL_DATABASE:-cc_site}?charset=utf8mb4
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      SITE_URL: ${SITE_URL:-http://localhost:8080}
    volumes:
      - ${UPLOADS_DATA_DIR:-uploads_data}:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  mysql_data: {}
  uploads_data: {}
